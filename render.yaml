services:
  - type: web
    name: red-alert
    env: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SERVER_AUDIO_ENABLED
        value: "false"
      - key: PUBLIC_BASE_URL
        value: "https://red-alert-o5nd.onrender.com"
      - key: PUBLIC_REPO_URL
        value: "https://github.com/zangiamit91/red-alert"
